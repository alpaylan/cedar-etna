how_triggered = "Removing the `if str.contains '_' then .none else ŌĆ”` gates from `toInt?'`/`toNat?'` exposes Lean's lenient `String.toInt?` behavior to the parser, so `Decimal.parse \"1_2.34\"` returns `some 12.3400` instead of `none`."

