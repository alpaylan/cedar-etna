[[tasks]]
mutations = ["encoder_empty_record_well_formed_7b9fe45_1"]

[tasks.source]
repo = "https://github.com/cedar-policy/cedar-spec"
commits = ["7b9fe456931e826d272455c233ccefa3552f0493"]
commit_subjects = ["Fix encodings of empty record literals (#752)"]
prs = [752]
summary = """
SymCC encoder soundness gap on empty-record literals. Pre-#752,
`defineRecord tyEnc tEncs` unconditionally emitted
`({tyEnc} {String.intercalate " " tEncs})` as the SMT term body. For
`tEncs = []`, the intercalate result is the empty string, so the
emitted body becomes `({tyEnc} )` ŌĆö a parenthesized application with
zero arguments and a stray internal space, which is not a legal SMT-LIB
2.7 s-expression. Downstream solvers either reject the script or
silently misparse it; either way symbolic verification of policies
that mention empty record literals (a legal Cedar value) is unsound.

The fix gates on `tEncs.isEmpty`: when there are no field encodings,
emit the bare type-constructor `{tyEnc}` (an `as` constant of the
record sort); otherwise emit the parenthesized form as before. The
synthetic ETNA patch removes that gate, restoring the malformed-empty
emission.
"""

[tasks.injection]
kind = "patch"
files = ["cedar-lean/Cedar/SymCC/Encoder.lean"]
locations = [
  { file = "cedar-lean/Cedar/SymCC/Encoder.lean", line = 230, symbol = "Cedar.SymCC.Encoder.defineRecord" },
]
patch = "patches/encoder_empty_record_well_formed_7b9fe45_1.patch"

[tasks.bug]
short_name = "encoder_empty_record_well_formed"
invariant = "The SMT-LIB text produced by `defineRecord tyEnc []` does not contain the malformed empty-application substring `({tyEnc} )` (a parenthesized constructor with zero arguments and a single internal space)."
how_triggered = "Removing the `tEncs.isEmpty` guard from `defineRecord` makes the empty-list case fall through to the parenthesized format string, emitting `({tyEnc} )` as the term body. The witness invokes `defineRecord \"R0\" []`, captures the SMT input stream into an `IO.FS.Buffer`, and observes the malformed substring."

[[tasks.tasks]]
property = "EncoderEmptyRecordWellFormed"
witnesses = [
  { test_fn = "witness_encoder_empty_record_well_formed_case_record_zero_fields", note = "defineRecord \"R0\" []; fix emits bare `R0`, bug emits malformed `(R0 )`" },
]

