short_name = "encoder_empty_record_decode_roundtrip"
invariant = "If `tyEnc` is registered as a `TermType.record (Map.mk [])` in `IdMaps.types`, then `SExpr.decodeLit ids (.symbol tyEnc)` returns `Except.ok (Term.record (Map.mk []))` ŌĆö never `Except.error \"enum id\"`."
